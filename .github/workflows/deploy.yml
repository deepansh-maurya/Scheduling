name: Deploy Backend

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
           cd /home/ec2-user/apps/app1/scheduling/backend
           git pull origin main
           npm install
           npm run build
           pm2 delete scheduling-backend || true
           pm2 start dist/main.js --name scheduling-backend
           pm2 save